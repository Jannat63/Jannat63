    <text x="863" y="454" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#FF5722" text-anchor="middle">80%</text>
    <text x="863" y="474" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">GEO Score</text>
