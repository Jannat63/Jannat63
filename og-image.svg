    <text x="989" y="454" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#22C55E" text-anchor="middle">98%</text>
    <text x="989" y="474" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Satisfaction</text>

