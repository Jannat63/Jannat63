    <ellipse cx="100" cy="520" rx="260" ry="180" fill="#7C3AED" opacity="0.05" filter="url(#soft-blur)"/>
    <ellipse cx="600" cy="315" rx="400" ry="260" fill="#00D9FF" opacity="0.02" filter="url(#soft-blur)"/>

    <!-- Grid dot pattern — top right quadrant -->
