    <text x="944" y="536" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4B5563" text-anchor="middle">Search Intelligence · AI Optimization · Growth</text>
    <text x="944" y="554" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4B5563" text-anchor="middle" font-style="italic">@Jannat63</text>

