      <circle cx="760" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="840" cy="100" r="1.5"/><circle cx="880" cy="100" r="1.5"/><circle cx="920" cy="100" r="1.5"/><circle cx="960" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1040" cy="100" r="1.5"/><circle cx="1080" cy="100" r="1.5"/><circle cx="1120" cy="100" r="1.5"/><circle cx="1160" cy="100" r="1.5"/>
      <circle cx="760" cy="140" r="1.5"/><circle cx="800" cy="140" r="1.5"/><circle cx="840" cy="140" r="1.5"/><circle cx="880" cy="140" r="1.5"/><circle cx="920" cy="140" r="1.5"/><circle cx="960" cy="140" r="1.5"/><circle cx="1000" cy="140" r="1.5"/><circle cx="1040" cy="140" r="1.5"/><circle cx="1080" cy="140" r="1.5"/><circle cx="1120" cy="140" r="1.5"/><circle cx="1160" cy="140" r="1.5"/>
      <circle cx="760" cy="180" r="1.5"/><circle cx="800" cy="180" r="1.5"/><circle cx="840" cy="180" r="1.5"/><circle cx="880" cy="180" r="1.5"/><circle cx="920" cy="180" r="1.5"/><circle cx="960" cy="180" r="1.5"/><circle cx="1000" cy="180" r="1.5"/><circle cx="1040" cy="180" r="1.5"/><circle cx="1080" cy="180" r="1.5"/><circle cx="1120" cy="180" r="1.5"/><circle cx="1160" cy="180" r="1.5"/>
