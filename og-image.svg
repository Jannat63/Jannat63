    <text x="863" y="380" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#00D9FF" text-anchor="middle">92%</text>
    <text x="863" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">SEO Score</text>
    <!-- AEO -->
