    <text x="989" y="380" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#7C3AED" text-anchor="middle">85%</text>
    <text x="989" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">AEO Score</text>
    <!-- GEO -->
