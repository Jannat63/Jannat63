name: Generate OG Image PNG

on:
  push:
    paths:
      - "og-image.svg"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CairoSVG
        run: pip install cairosvg

      - name: Convert SVG → PNG
        run: |
          python3 -c "
          import cairosvg
          cairosvg.svg2png(
              url='og-image.svg',
              write_to='og-image.png',
              output_width=1200,
              output_height=630
          )
          print('og-image.png generated at 1200x630')
          "

      - name: Commit PNG to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add og-image.png
          git diff --cached --quiet || git commit -m "chore: regenerate og-image.png from svg"
          git push
